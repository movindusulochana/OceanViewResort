<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanView Resort &mdash; Login</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" href="assets/icon.jpeg" type="image/jpeg">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Brand Identity -->
        <div class="login-logo">
            <img src="assets/icon.jpeg" alt="OceanView Resort Logo" onerror="this.style.display='none'">
            <span class="brand-name">OceanView Resort</span>
            <span class="brand-sub">Management System</span>
        </div>

        <h2>Welcome back</h2>

        <!-- Error message -->
        <div class="alert alert-danger" id="loginError"></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       placeholder="Enter your username"
                       autocomplete="username"
                       required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       autocomplete="current-password"
                       required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                Sign In
            </button>
        </form>

    </div>
</div>

<script>
    // If already logged in, go to dashboard
    if (sessionStorage.getItem('loggedIn') === 'true') {
        window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const errorEl = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');
        errorEl.classList.remove('show');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            errorEl.textContent = 'Please enter both username and password.';
            errorEl.classList.add('show');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const params = new URLSearchParams({ username, password });
            const res = await fetch('login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });

            const data = await res.json();

            if (data.success) {
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('username', data.username || username);
                sessionStorage.setItem('role', data.role || 'Staff');
                window.location.href = 'dashboard.html';
            } else {
                errorEl.textContent = data.message || 'Invalid credentials. Please try again.';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        } catch (err) {
            errorEl.textContent = 'Cannot connect to server. Please try again.';
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
</script>

</body>
</html>
